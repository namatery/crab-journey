<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <title>🦀 Crab Duel</title>
</head>

<body>
    <div id="app">
        <div id="pixi-container"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>

    <div id="lobby">
        <img class="sun" src="/assets/sun.png" alt="" aria-hidden="true" />
        <img class="cactus cactus-left" src="/assets/cactus.png" alt="" aria-hidden="true" />
        <img class="cactus cactus-right" src="/assets/cactus.png" alt="" aria-hidden="true" />
        <div class="sand"></div>
        <img class="crab crab-left" src="/assets/crab.png" alt="" aria-hidden="true" />
        <img class="crab crab-right" src="/assets/crab.png" alt="" aria-hidden="true" />

        <div class="panel">
            <h1>🦀 Crab Duel</h1>
            <p class="tagline">A desert whip-duel for two</p>

            <div class="section">
                <button id="host-btn">Host Game</button>
                <div id="host-info"></div>
            </div>

            <div class="divider"><span>or</span></div>

            <div class="section">
                <input id="join-input" placeholder="ROOM CODE" maxlength="4" autocomplete="off" spellcheck="false" />
                <button id="join-btn">Join Game</button>
            </div>

            <p id="status"></p>
        </div>
    </div>

</body>

</html>
